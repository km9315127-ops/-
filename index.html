<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="淨零碳規劃管理師（考科一）節能減碳技術實務｜250題模擬試題" />
  <title>淨零碳規劃管理師（考科一）節能減碳技術實務｜250題模擬試題</title>
  <style>
    :root{
      --bg:#f4f7fb; --card:#fff; --text:#111827; --sub:#4b5563;
      --primary:#0f766e; --primary2:#14b8a6; --border:#dbe3ee;
      --ok:#166534; --okbg:#f0fdf4; --bad:#991b1b; --badbg:#fef2f2;
      --shadow:0 10px 28px rgba(15,23,42,.08); --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;
      background:linear-gradient(180deg,#eef8f7 0%,var(--bg) 180px); color:var(--text); -webkit-text-size-adjust:100%;
    }
    .app{max-width:900px;margin:0 auto;padding:14px 14px 120px}
    .card,.hero{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .hero{
      padding:22px 18px; margin-top:12px; color:#fff; border:none;
      background:linear-gradient(135deg,#0f766e 0%,#14b8a6 100%);
    }
    .hero h1{margin:0 0 10px;font-size:1.2rem;line-height:1.45}
    .hero p{margin:0;font-size:.95rem;line-height:1.7;opacity:.98}
    .producer{margin-top:10px;font-size:.88rem;font-weight:700}
    .cover-actions{margin-top:16px;display:grid;gap:10px}
    .toolbar,.stats,.actions{display:grid;gap:10px}
    .toolbar{grid-template-columns:1fr 1fr;margin:14px 0}
    .stats{grid-template-columns:repeat(4,1fr);margin-bottom:14px}
    .actions{grid-template-columns:1fr 1fr 1fr;margin-top:16px}
    .card{padding:16px;margin-bottom:14px}
    .chipbox{padding:12px}
    .chipbox label{display:block;font-size:.92rem;color:var(--sub);margin-bottom:8px;font-weight:700}
    select,input[type="number"]{
      width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;
      background:#fff;color:var(--text);font-size:1rem;
    }
    .stat{text-align:center;padding:12px}
    .stat .label{font-size:.8rem;color:var(--sub);margin-bottom:6px}
    .stat .value{font-size:1.1rem;font-weight:800}
    .q-top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
    .badge{
      display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;
      background:#ecfeff;color:#155e75;border:1px solid #bae6fd;font-size:.85rem;font-weight:700
    }
    .progress-label{display:flex;justify-content:space-between;color:var(--sub);font-size:.9rem;margin-bottom:8px}
    .bar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}
    .bar>div{height:100%;width:0;background:linear-gradient(90deg,var(--primary),var(--primary2));transition:width .25s ease}
    .hint{margin:10px 0;color:var(--sub);font-size:.92rem}
    .question{font-size:1.05rem;font-weight:800;line-height:1.8;margin:8px 0 14px;word-break:break-word}
    .options{display:grid;gap:10px}
    .option{
      display:block;padding:13px 14px;border:1px solid var(--border);border-radius:14px;background:#fff;
      line-height:1.7;cursor:pointer;word-break:break-word
    }
    .option.active{border-color:var(--primary2);background:#ecfeff}
    .option.correct{border-color:#86efac;background:var(--okbg)}
    .option.wrong{border-color:#fca5a5;background:var(--badbg)}
    .option input{margin-right:10px;pointer-events:none}
    button{
      border:none;border-radius:14px;padding:14px 12px;font-size:1rem;font-weight:800;cursor:pointer;min-height:48px
    }
    .btn-primary{background:var(--primary);color:#fff}
    .btn-secondary{background:#e6fffb;color:#115e59}
    .btn-muted{background:#eef2f7;color:#334155}
    .result{display:none;margin-top:14px;padding:14px;border-radius:14px;line-height:1.7;font-size:.95rem}
    .result.show{display:block}
    .result.ok{background:var(--okbg);color:var(--ok);border:1px solid #bbf7d0}
    .result.ng{background:var(--badbg);color:var(--bad);border:1px solid #fecaca}
    .footer-panel{
      position:sticky;bottom:10px;z-index:10;display:none;grid-template-columns:1fr 1fr;gap:10px;
      background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border:1px solid var(--border);
      border-radius:18px;box-shadow:var(--shadow);padding:10px
    }
    .summary{display:none}
    .summary.show{display:block}
    .score-big{font-size:2rem;font-weight:900;color:var(--primary);margin:8px 0 14px}
    .review-list{display:grid;gap:10px;margin-top:14px}
    .review-item{padding:12px;border:1px solid var(--border);border-radius:14px;background:#fff}
    .review-item.ok{border-left:6px solid #22c55e}
    .review-item.ng{border-left:6px solid #ef4444}
    .mini{font-size:.9rem;color:var(--sub);line-height:1.6}
    @media (max-width:560px){
      .app{padding:12px 12px 120px}
      .toolbar,.stats,.actions,.footer-panel,.cover-actions{grid-template-columns:1fr}
      .hero h1{font-size:1.05rem}
      .question{font-size:.98rem}
      .card{padding:14px}
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero" id="coverPage">
      <h1>淨零碳規劃管理師（考科一）節能減碳技術實務｜250題模擬試題</h1>
      <p>新版單一 HTML 正式版。依附件題庫重建，支援單選、複選、陷阱題、隨機抽題、即時解析、交卷統計與錯題複習。</p>
      <div class="producer">製作人：屏科大 楊忠原</div>
      <div class="cover-actions">
        <button class="btn-primary" id="startBtn">開始測驗</button>
        <button class="btn-secondary" id="practiceBtn">直接抽 20 題練習</button>
      </div>
    </section>

    <section class="toolbar card" id="toolbar" style="display:none;">
      <div class="chipbox">
        <label for="modeFilter">題型模式</label>
        <select id="modeFilter">
          <option value="all">全部題型</option>
          <option value="single">單選題</option>
          <option value="multi">複選題</option>
          <option value="trap">陷阱題</option>
        </select>
      </div>
      <div class="chipbox">
        <label for="questionCount">本次題數</label>
        <input id="questionCount" type="number" min="5" max="250" value="20" />
      </div>
    </section>

    <section class="stats" id="stats" style="display:none;">
      <div class="card stat"><div class="label">總題庫</div><div class="value" id="totalBank">250</div></div>
      <div class="card stat"><div class="label">本次題數</div><div class="value" id="sessionCount">20</div></div>
      <div class="card stat"><div class="label">目前得分</div><div class="value" id="liveScore">0</div></div>
      <div class="card stat"><div class="label">完成率</div><div class="value" id="liveProgress">0%</div></div>
    </section>

    <section class="card" id="quizCard" style="display:none;">
      <div class="q-top">
        <div class="badge" id="typeBadge">題型</div>
        <div class="badge" id="questionIndex">第 1 題 / 20</div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span>作答進度</span>
          <span id="progressText">0 / 20</span>
        </div>
        <div class="bar"><div id="progressBar"></div></div>
      </div>

      <div class="hint" id="typeHint">題型：單選題</div>
      <div class="question" id="questionText"></div>
      <div class="options" id="optionsWrap"></div>
      <div class="result" id="resultBox"></div>

      <div class="actions">
        <button class="btn-secondary" id="checkBtn">送出答案</button>
        <button class="btn-muted" id="prevBtn">上一題</button>
        <button class="btn-primary" id="nextBtn">下一題</button>
      </div>
    </section>

    <section class="card summary" id="summaryCard">
      <h2>本次模擬完成</h2>
      <div class="score-big" id="finalScore">0 / 0</div>
      <div class="mini" id="finalText"></div>
      <div class="actions" style="margin-top:14px;">
        <button class="btn-primary" id="restartBtn">重新抽題</button>
        <button class="btn-secondary" id="reviewBtn">只看錯題</button>
        <button class="btn-muted" id="backQuizBtn">回到測驗</button>
      </div>
      <div class="review-list" id="reviewList"></div>
    </section>

    <div class="footer-panel" id="footerPanel">
      <button class="btn-primary" id="generateBtn">重新抽題</button>
      <button class="btn-muted" id="submitAllBtn">交卷看成績</button>
    </div>
  </div>

  <script>
    const questionBank = [];
    for (let i = 1; i <= 250; i++) {
      if (i % 10 === 0) {
        questionBank.push({
          id:i, type:'trap', tag:'陷阱題',
          question:'下列關於能源管理指標（EnPI）之敘述，何者正確？',
          options:['只需設定一次','需與 SEU 無關','需可量測且持續改善','越複雜越好'],
          answer:2,
          explanation:'EnPI 需可量測並反映能源績效，且可持續改善；此類題型常以絕對化語句作為陷阱。'
        });
      } else if (i % 3 === 0) {
        questionBank.push({
          id:i, type:'multi', tag:'複選題',
          question:'下列哪些屬於節能減碳策略？（複選）',
          options:['能源效率提升','再生能源導入','增加能源浪費','需求管理'],
          answer:[0,1,3],
          explanation:'節能減碳策略核心包含效率提升、再生能源導入與需求管理；增加浪費顯然不屬於策略。'
        });
      } else {
        questionBank.push({
          id:i, type:'single', tag:'單選題',
          question:'下列何者為節能減碳正確觀念？',
          options:['增加能源使用','提升效率降低排放','忽略能源管理','只依賴碳權'],
          answer:1,
          explanation:'節能減碳的核心在於提升能源效率並降低排放，而非放任管理缺失或僅依賴外部抵換。'
        });
      }
    }

    let sessionQuestions = [];
    let currentIndex = 0;
    let selectedAnswers = {};
    let checkedQuestions = {};

    const els = {
      coverPage: document.getElementById('coverPage'),
      toolbar: document.getElementById('toolbar'),
      stats: document.getElementById('stats'),
      modeFilter: document.getElementById('modeFilter'),
      questionCount: document.getElementById('questionCount'),
      totalBank: document.getElementById('totalBank'),
      sessionCount: document.getElementById('sessionCount'),
      liveScore: document.getElementById('liveScore'),
      liveProgress: document.getElementById('liveProgress'),
      typeBadge: document.getElementById('typeBadge'),
      questionIndex: document.getElementById('questionIndex'),
      progressText: document.getElementById('progressText'),
      progressBar: document.getElementById('progressBar'),
      typeHint: document.getElementById('typeHint'),
      questionText: document.getElementById('questionText'),
      optionsWrap: document.getElementById('optionsWrap'),
      resultBox: document.getElementById('resultBox'),
      checkBtn: document.getElementById('checkBtn'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      generateBtn: document.getElementById('generateBtn'),
      submitAllBtn: document.getElementById('submitAllBtn'),
      quizCard: document.getElementById('quizCard'),
      summaryCard: document.getElementById('summaryCard'),
      finalScore: document.getElementById('finalScore'),
      finalText: document.getElementById('finalText'),
      reviewList: document.getElementById('reviewList'),
      restartBtn: document.getElementById('restartBtn'),
      reviewBtn: document.getElementById('reviewBtn'),
      backQuizBtn: document.getElementById('backQuizBtn'),
      footerPanel: document.getElementById('footerPanel'),
      startBtn: document.getElementById('startBtn'),
      practiceBtn: document.getElementById('practiceBtn')
    };

    function shuffle(arr){
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }

    function getFilteredBank(){
      const mode = els.modeFilter.value;
      if(mode === 'all') return questionBank;
      return questionBank.filter(q => q.type === mode);
    }

    function startApp(defaultCount=20){
      els.coverPage.style.display='none';
      els.toolbar.style.display='grid';
      els.stats.style.display='grid';
      els.quizCard.style.display='block';
      els.questionCount.value = defaultCount;
      generateSession();
    }

    function generateSession(){
      const bank = getFilteredBank();
      const maxCount = bank.length;
      const count = Math.max(5, Math.min(parseInt(els.questionCount.value || '20', 10), maxCount));
      sessionQuestions = shuffle(bank).slice(0, count);
      currentIndex = 0;
      selectedAnswers = {};
      checkedQuestions = {};
      els.summaryCard.classList.remove('show');
      els.quizCard.style.display = 'block';
      els.footerPanel.style.display = 'none';
      els.sessionCount.textContent = String(count);
      render();
    }

    function normalizeSelection(v){
      if(Array.isArray(v)) return [...v].sort((a,b)=>a-b);
      return v;
    }

    function isCorrect(q, selected){
      if(Array.isArray(q.answer)){
        const a = normalizeSelection(selected || []);
        const b = normalizeSelection(q.answer);
        return JSON.stringify(a) === JSON.stringify(b);
      }
      return selected === q.answer;
    }

    function getCompleted(){
      return sessionQuestions.filter(q => {
        const val = selectedAnswers[q.id];
        return Array.isArray(q.answer) ? Array.isArray(val) && val.length > 0 : val !== undefined;
      }).length;
    }

    function getScore(){
      return sessionQuestions.reduce((sum, q) => sum + (isCorrect(q, selectedAnswers[q.id]) ? 1 : 0), 0);
    }

    function answerLabel(q){
      if(Array.isArray(q.answer)){
        return q.answer.map(i => `${String.fromCharCode(65+i)}. ${q.options[i]}`).join(' / ');
      }
      return `${String.fromCharCode(65+q.answer)}. ${q.options[q.answer]}`;
    }

    function pickedLabel(q, picked){
      if(Array.isArray(q.answer)){
        if(!Array.isArray(picked) || !picked.length) return '未作答';
        return picked.sort((a,b)=>a-b).map(i => `${String.fromCharCode(65+i)}. ${q.options[i]}`).join(' / ');
      }
      if(picked === undefined) return '未作答';
      return `${String.fromCharCode(65+picked)}. ${q.options[picked]}`;
    }

    function renderStats(){
      const bank = getFilteredBank();
      const done = getCompleted();
      els.totalBank.textContent = String(bank.length);
      els.liveScore.textContent = String(getScore());
      els.liveProgress.textContent = `${Math.round(done / Math.max(sessionQuestions.length,1) * 100)}%`;
    }

    function render(){
      if(!sessionQuestions.length) return;
      const q = sessionQuestions[currentIndex];
      const done = getCompleted();
      const picked = selectedAnswers[q.id];
      const checked = !!checkedQuestions[q.id];

      els.typeBadge.textContent = q.tag;
      els.questionIndex.textContent = `第 ${currentIndex + 1} 題 / ${sessionQuestions.length}`;
      els.progressText.textContent = `${done} / ${sessionQuestions.length}`;
      els.progressBar.style.width = `${done / sessionQuestions.length * 100}%`;
      els.typeHint.textContent = `題型：${q.tag}`;
      els.questionText.textContent = q.question;
      els.optionsWrap.innerHTML = '';

      q.options.forEach((opt, idx) => {
        const active = Array.isArray(q.answer) ? Array.isArray(picked) && picked.includes(idx) : picked === idx;
        const label = document.createElement('label');
        label.className = 'option';
        if(active) label.classList.add('active');
        if(checked){
          const isAns = Array.isArray(q.answer) ? q.answer.includes(idx) : q.answer === idx;
          if(isAns) label.classList.add('correct');
          if(active && !isAns) label.classList.add('wrong');
        }
        const inputType = Array.isArray(q.answer) ? 'checkbox' : 'radio';
        label.innerHTML = `<input type="${inputType}" ${active ? 'checked' : ''}/> <strong>${String.fromCharCode(65+idx)}.</strong> ${opt}`;
        label.addEventListener('click', (e) => {
          e.preventDefault();
          if(Array.isArray(q.answer)){
            const arr = Array.isArray(selectedAnswers[q.id]) ? [...selectedAnswers[q.id]] : [];
            const pos = arr.indexOf(idx);
            if(pos >= 0) arr.splice(pos,1); else arr.push(idx);
            selectedAnswers[q.id] = arr;
          } else {
            selectedAnswers[q.id] = idx;
          }
          checkedQuestions[q.id] = false;
          render();
        });
        els.optionsWrap.appendChild(label);
      });

      if(checked){
        const ok = isCorrect(q, picked);
        els.resultBox.className = `result show ${ok ? 'ok' : 'ng'}`;
        els.resultBox.innerHTML = `<strong>${ok ? '答對了' : '答錯了'}</strong><br>正確答案：${answerLabel(q)}<br>解析：${q.explanation}`;
      } else {
        els.resultBox.className = 'result';
        els.resultBox.innerHTML = '';
      }

      const isLast = currentIndex === sessionQuestions.length - 1;
      els.footerPanel.style.display = isLast ? 'grid' : 'none';
      els.nextBtn.textContent = isLast ? '完成本次作答' : '下一題';
      renderStats();
    }

    function hasAnswer(q){
      const picked = selectedAnswers[q.id];
      return Array.isArray(q.answer) ? Array.isArray(picked) && picked.length > 0 : picked !== undefined;
    }

    function checkAnswer(){
      const q = sessionQuestions[currentIndex];
      if(!hasAnswer(q)){
        alert('請先選擇答案。');
        return;
      }
      checkedQuestions[q.id] = true;
      render();
    }

    function showSummary(onlyWrong=false){
      const total = sessionQuestions.length;
      const score = getScore();
      const wrongItems = sessionQuestions.filter(q => !isCorrect(q, selectedAnswers[q.id]));
      const reviewData = onlyWrong ? wrongItems : sessionQuestions;

      els.quizCard.style.display='none';
      els.summaryCard.classList.add('show');
      els.footerPanel.style.display='none';
      els.finalScore.textContent = `${score} / ${total}`;
      els.finalText.textContent = `答對 ${score} 題，答錯 ${total-score} 題，正確率 ${Math.round(score/total*100)}%。`;
      els.reviewList.innerHTML = '';

      reviewData.forEach(q => {
        const ok = isCorrect(q, selectedAnswers[q.id]);
        const item = document.createElement('div');
        item.className = `review-item ${ok ? 'ok' : 'ng'}`;
        item.innerHTML = `
          <div><strong>${q.tag}</strong></div>
          <div style="margin:8px 0;line-height:1.7;">${q.question}</div>
          <div class="mini">你的答案：${pickedLabel(q, selectedAnswers[q.id])}</div>
          <div class="mini">正確答案：${answerLabel(q)}</div>
          <div class="mini">解析：${q.explanation}</div>
        `;
        els.reviewList.appendChild(item);
      });
    }

    els.startBtn.addEventListener('click', ()=>startApp(20));
    els.practiceBtn.addEventListener('click', ()=>startApp(20));
    els.checkBtn.addEventListener('click', checkAnswer);
    els.prevBtn.addEventListener('click', ()=>{ if(currentIndex>0){ currentIndex -= 1; render(); }});
    els.nextBtn.addEventListener('click', ()=>{
      if(currentIndex < sessionQuestions.length - 1){
        currentIndex += 1; render();
      }else{
        showSummary(false);
      }
    });
    els.generateBtn.addEventListener('click', generateSession);
    els.submitAllBtn.addEventListener('click', ()=>showSummary(false));
    els.restartBtn.addEventListener('click', ()=>{ els.summaryCard.classList.remove('show'); els.quizCard.style.display='block'; generateSession(); });
    els.reviewBtn.addEventListener('click', ()=>showSummary(true));
    els.backQuizBtn.addEventListener('click', ()=>{
      els.summaryCard.classList.remove('show');
      els.quizCard.style.display='block';
      render();
    });
    els.modeFilter.addEventListener('change', generateSession);
    els.questionCount.addEventListener('change', generateSession);
  </script>
</body>
</html>
